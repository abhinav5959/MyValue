<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House Price Prediction | MyValue</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>
/* ================= BASE ================= */
body.predict-page {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #030305;
    color: white;
}
html, body {
    margin: 0;
    padding: 0;
    height: auto;
    overflow-x: hidden;
    overflow-y: auto;
}

/* ================= BACKGROUND ================= */
.solar-background-canvas {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: radial-gradient(circle at top,
        rgba(255,106,0,0.12),
        rgba(3,3,5,1) 70%
    );
}

/* ================= NAVBAR ================= */
.global-navbar-pod {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 40px);
    max-width: 1000px;
    height: 64px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 30px;
    background: rgba(5,5,8,0.75);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 32px;
    backdrop-filter: blur(25px);
    z-index: 1000;
}

.nav-links-cluster a {
    color: #cbd5e1;
    text-decoration: none;
    margin: 0 10px;
    font-weight: 600;
}

/* ================= CONTAINER & CARD ================= */
.page-wrapper {
    position: relative;
    z-index: 5;
    padding: 120px 20px 60px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 180px);
}

.form-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 40px;
    max-width: 800px;
    width: 100%;
    backdrop-filter: blur(10px);
}

h2 {
    margin-top: 0;
    margin-bottom: 5px;
    font-size: 28px;
    letter-spacing: 0.5px;
    text-align: center;
}

.subtitle {
    color: #94a3b8;
    font-size: 14px;
    margin-bottom: 35px;
    text-align: center;
}

/* ================= TWO-COLUMN FORM GRID ================= */
.form-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
}

@media (max-width: 650px) {
    .form-grid {
        grid-template-columns: 1fr;
    }
}

.input-group {
    display: flex;
    flex-direction: column;
}

.input-group label {
    font-size: 13px;
    color: #cbd5e1;
    margin-bottom: 8px;
    font-weight: 600;
}

.input-group input, 
.input-group select {
    padding: 12px;
    background: rgba(15, 15, 25, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 6px;
    color: white;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
}

.input-group input:focus, 
.input-group select:focus {
    border-color: #ff6a00;
}

/* ================= SUBMIT BUTTON ================= */
.submit-container {
    grid-column: span 2;
    text-align: center;
    margin-top: 25px;
}

@media (max-width: 650px) {
    .submit-container {
        grid-column: span 1;
    }
}

.action-btn {
    display: inline-block;
    width: 50%;
    min-width: 200px;
    padding: 14px;
    border: none;
    border-radius: 6px;
    background: #ff6a00;
    color: black;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    transition: opacity 0.2s ease;
}

.action-btn:hover {
    opacity: 0.9;
}
</style>
</head>

<body class="predict-page">

<div class="solar-background-canvas"></div>

<nav class="global-navbar-pod">
    <div class="nav-brand-container">
        <span class="brand-text">MyValue</span>
    </div>
    <div class="nav-links-cluster">
        <a href="/" class="nav-link-item">Home</a>
        <a href="/predict/house" class="nav-link-item">House Prediction</a>
    </div>
</nav>

<main class="page-wrapper">

    <div class="form-card">
        <h2>House Valuation Parameters</h2>
        <p class="subtitle">Enter property design details to execute the evaluation model</p>

        <form action="/predict/house/result" method="POST" class="form-grid">
            
            <!-- 1. Bedrooms -->
            <div class="input-group">
                <label for="number_of_bedrooms">Number of Bedrooms</label>
                <input type="number" id="number_of_bedrooms" name="number_of_bedrooms" min="0" max="20" required>
            </div>

            <!-- 2. Bathrooms -->
            <div class="input-group">
                <label for="number_of_bathrooms">Number of Bathrooms</label>
                <input type="number" id="number_of_bathrooms" name="number_of_bathrooms" min="0" max="10" step="0.5" required>
            </div>

            <!-- 3. Floors -->
            <div class="input-group">
                <label for="number_of_floors">Number of Floors</label>
                <input type="number" id="number_of_floors" name="number_of_floors" min="1" max="5" required>
            </div>

            <!-- 4. Views -->
            <div class="input-group">
                <label for="number_of_views">Number of View Inspections (0-4)</label>
                <input type="number" id="number_of_views" name="number_of_views" min="0" max="4" required>
            </div>

            <!-- 5. Schools Nearby -->
            <div class="input-group">
                <label for="number_of_schools_nearby">Schools Nearby</label>
                <input type="number" id="number_of_schools_nearby" name="number_of_schools_nearby" min="0" max="5" required>
            </div>

            <!-- 6. Living Area -->
            <div class="input-group">
                <label for="living_area">Total Living Area (sqft)</label>
                <input type="number" id="living_area" name="living_area" min="100" max="20000" required>
            </div>

            <!-- 7. Waterfront Present -->
            <div class="input-group">
                <label for="waterfront">Waterfront Location?</label>
                <select id="waterfront" name="waterfront" required>
                    <option value="" disabled selected hidden>-- Choose Location --</option>
                    <option value="0">No (Inland)</option>
                    <option value="1">Yes (Waterfront Property)</option>
                </select>
            </div>

            <!-- 8. Condition of House -->
            <div class="input-group">
                <label for="condition_of_the_house">Condition Rating (1-5)</label>
                <select id="condition_of_the_house" name="condition_of_the_house" required>
                    <option value="" disabled selected hidden>-- Choose Rating --</option>
                    <option value="1">1 (Poor / Worn Out)</option>
                    <option value="2">2 (Fair)</option>
                    <option value="3">3 (Average / Maintained)</option>
                    <option value="4">4 (Good)</option>
                    <option value="5">5 (Excellent)</option>
                </select>
            </div>

            <!-- 9. Distance from Airport -->
            <div class="input-group">
                <label for="distance_from_the_airport">Distance from Airport (km)</label>
                <input type="number" id="distance_from_the_airport" name="distance_from_the_airport" min="0" max="200" step="0.1" required>
            </div>

            <!-- 10. Grade of House -->
            <div class="input-group">
                <label for="grade_of_the_house">Construction Grade (1-13)</label>
                <input type="number" id="grade_of_the_house" name="grade_of_the_house" min="1" max="13" required>
            </div>

            <!-- 11. Area of House Without Basement -->
            <div class="input-group">
                <label for="area_without_basement">Above-Ground Area (sqft)</label>
                <input type="number" id="area_without_basement" name="area_without_basement" min="100" max="15000" required>
            </div>

            <!-- 12. Basement Area -->
            <div class="input-group">
                <label for="basement_area">Basement Area (sqft)</label>
                <input type="number" id="basement_area" name="basement_area" min="0" max="10000" required>
            </div>

            <!-- 13. Built Year -->
            <div class="input-group">
                <label for="built_year">Year Built</label>
                <input type="number" id="built_year" name="built_year" min="1900" max="2026" required>
            </div>

            <!-- 14. Renovation Year -->
            <div class="input-group">
                <label for="renovation_year">Year Renovated (0 if never)</label>
                <input type="number" id="renovation_year" name="renovation_year" min="0" max="2026" required>
            </div>

            <!-- 15. Lot Area -->
            <div class="input-group">
                <label for="lot_area">Total Lot Size / Plot Area (sqft)</label>
                <input type="number" id="lot_area" name="lot_area" min="100" max="100000" required>
            </div>

            <!-- Form Submission Button -->
            <div class="submit-container">
                <button type="submit" class="action-btn">Evaluate Property Price ➔</button>
            </div>

        </form>
    </div>

</main>

</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House Prediction | MyValue</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>

/* ================= BASE ================= */
body.house-page {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #030305;
    color: white;
}
html, body {
    margin: 0;
    padding: 0;
    height: auto;
    overflow-x: hidden;
    overflow-y: auto;
}

/* ================= BACKGROUND ================= */
.solar-background-canvas {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: radial-gradient(circle at top,
        rgba(255,106,0,0.15),
        rgba(3,3,5,1) 60%
    );
}

.solar-core-orb {
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: #ff6a00;
    filter: blur(120px);
    opacity: 0.25;
    margin: auto;
}

/* ================= NAVBAR ================= */
.global-navbar-pod {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 40px);
    max-width: 1000px;
    height: 64px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 30px;
    background: rgba(5,5,8,0.75);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 32px;
    backdrop-filter: blur(25px);
    z-index: 1000;
}

.nav-links-cluster a {
    color: #cbd5e1;
    text-decoration: none;
    margin: 0 10px;
    font-weight: 600;
    position: relative;
    display: inline-block;
    padding: 4px 0;
}

.nav-links-cluster a.active {
    color: white;
}

.nav-links-cluster a.active::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: -6px;
    transform: translateX(-50%);
    width: 100%;
    height: 2px;
    background: #ff6a00;
    border-radius: 2px;
}

/* ================= PAGE ================= */
.page-wrapper {
    position: relative;
    z-index: 5;
    padding: 120px 40px 60px;
    width: 80%;
    margin: auto;
    min-height: 100vh;
    overflow: visible;
}

/* ================= HEADINGS ================= */
.section-headline-area {
    text-align: center;
    margin-bottom: 25px;
}

h2 {
    margin-bottom: 5px;
}

.section-subtitle {
    color: #94a3b8;
    margin-top: 6px;
}

/* ================= GRID ================= */
.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
}

.form-box {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 25px;
}

/* ================= INPUT FIX ================= */
.input-field-group {
    margin-bottom: 14px;
}

label {
    font-size: 12px;
    color: #94a3b8;
    display: block;
    margin-bottom: 6px;
}

input,
select {
    width: 100%;
    height: 42px;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(0,0,0,0.4);
    color: white;
    font-size: 14px;
    box-sizing: border-box;
}

/* ================= DROPDOWN STYLE ================= */
select {
    appearance: none;
    cursor: pointer;
    background-image:
        linear-gradient(45deg, transparent 50%, white 50%),
        linear-gradient(135deg, white 50%, transparent 50%);
    background-position:
        calc(100% - 18px) center,
        calc(100% - 13px) center;
    background-size: 5px 5px;
    background-repeat: no-repeat;
}

select option {
    background: black;
    color: white;
}

input:focus,
select:focus {
    outline: none;
    border-color: #ff6a00;
}

/* ================= BUTTON ================= */
button {
    margin-top: 20px;
    margin-left: auto;
    margin-right: auto;
    display: block;
    width: 50%;
    padding: 14px;
    border: none;
    border-radius: 6px;
    background: #ff6a00;
    color: black;
    font-weight: 700;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
}

input[type="number"] {
    -moz-appearance: textfield;
}

body.house-page {
    overflow: hidden;
}

.master-scroll-container {
    height: 100vh;
    overflow-y: auto;
    scroll-snap-type: none;
    scroll-behavior: smooth;
}

.snap-section {
    scroll-snap-align: start;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* ================= RESPONSIVE ================= */
@media(max-width: 900px){
    .form-grid{
        grid-template-columns: 1fr;
    }
}

</style>
</head>

<body class="house-page">

<div class="solar-background-canvas">
    <div class="solar-core-orb"></div>
</div>

<nav class="global-navbar-pod">
    <div class="nav-brand-container">
        <div class="brand-geometric-logo"></div>
        <span class="brand-text">MyValue</span>
    </div>

    <div class="nav-links-cluster">
        <a href="/" class="nav-link-item">Home</a>
        <a href="/predict/house" class="nav-link-item active">House Prediction</a>
    </div>

    <div class="nav-system-status">
        <span class="status-dot green-pulse"></span>
        <span class="status-label">Server Active</span>
        <span class="status-dot orange-pulse"></span>
        <span class="status-label">Model Standby</span>
    </div>
</nav>

<main class="master-scroll-container">
<section class="snap-section">
<div class="page-wrapper">

    <div class="section-headline-area">
        <h2>House Price Prediction</h2>
        <p class="section-subtitle">
            Enter details to estimate house price using ML model
        </p>
    </div>

    <form action="/predict/house/result" method="POST">
        <div class="form-grid">

            <div class="form-box">
                <div class="input-field-group">
                    <label>Number of Bedrooms</label>
                    <input type="number" name="number_of_bedrooms" placeholder="e.g., 3" required>
                </div>

                <div class="input-field-group">
                    <label>Number of Bathrooms</label>
                    <input type="number" name="number_of_bathrooms" placeholder="e.g., 2" required>
                </div>

                <div class="input-field-group">
                    <label>Living Area (Sq Ft)</label>
                    <input type="number" name="living_area" placeholder="e.g., 1800" required>
                </div>

                <div class="input-field-group">
                    <label>Lot Area (Sq Ft)</label>
                    <input type="number" name="lot_area" placeholder="e.g., 5000" required>
                </div>

                <div class="input-field-group">
                    <label>Number of Floors</label>
                    <input type="number" name="number_of_floors" placeholder="e.g., 2" required>
                </div>
            </div>

            <div class="form-box">
                <div class="input-field-group">
                    <label>Condition of the House (1-5)</label>
                    <input type="number" name="condition_of_the_house" min="1" max="5" placeholder="e.g., 3" required>
                </div>

                <div class="input-field-group">
                    <label>Grade of the House (1-13)</label>
                    <input type="number" name="grade_of_the_house" min="1" max="13" placeholder="e.g., 7" required>
                </div>

                <div class="input-field-group">
                    <label>Built Year</label>
                    <input type="number" name="built_year" placeholder="e.g., 2010" required>
                </div>

                <div class="input-field-group">
                    <label>Number of Schools Nearby</label>
                    <input type="number" name="number_of_schools_nearby" placeholder="e.g., 2" required>
                </div>

                <div class="input-field-group">
                    <label>Distance from the Airport (KM)</label>
                    <input type="number" step="0.01" name="distance_from_the_airport" placeholder="e.g., 12.5" required>
                </div>
            </div>

        </div>

        <button type="submit">Predict Price →</button>
    </form>

</div>
</section>
</main>

</body>
</html>

```

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prediction Result | MyValue</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>
/* ================= BASE ================= */
body.result-page {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #030305;
    color: white;
}
html, body {
    margin: 0;
    padding: 0;
    height: auto;
    overflow-x: hidden;
    overflow-y: auto;
}

/* ================= BACKGROUND ================= */
.solar-background-canvas {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: radial-gradient(circle at top,
        rgba(255,106,0,0.15),
        rgba(3,3,5,1) 60%
    );
}

.solar-core-orb {
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: #ff6a00;
    filter: blur(120px);
    opacity: 0.25;
    margin: auto;
}

/* ================= NAVBAR ================= */
.global-navbar-pod {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 40px);
    max-width: 1000px;
    height: 64px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 30px;
    background: rgba(5,5,8,0.75);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 32px;
    backdrop-filter: blur(25px);
    z-index: 1000;
}

.nav-links-cluster a {
    color: #cbd5e1;
    text-decoration: none;
    margin: 0 10px;
    font-weight: 600;
}

/* ================= CARD CONTAINER ================= */
.page-wrapper {
    position: relative;
    z-index: 5;
    padding: 140px 20px 60px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 200px);
}

.result-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 40px;
    max-width: 500px;
    width: 100%;
    text-align: center;
    backdrop-filter: blur(10px);
}

.result-card.error-card {
    border-color: rgba(239, 68, 68, 0.2);
    background: rgba(239, 68, 68, 0.02);
}

/* ================= TEXT STYLES ================= */
h2 {
    margin-top: 0;
    margin-bottom: 10px;
    font-size: 28px;
    letter-spacing: 0.5px;
}

.error-title {
    color: #ef4444;
}

.error-message {
    color: #94a3b8;
    font-size: 15px;
    margin-bottom: 30px;
    line-height: 1.5;
}

.price-display {
    font-size: 42px;
    font-weight: 800;
    color: #ff6a00;
    margin: 25px 0;
    text-shadow: 0 0 20px rgba(255, 106, 0, 0.3);
}

.subtitle {
    color: #94a3b8;
    font-size: 14px;
    margin-bottom: 30px;
}

/* ================= ACTION BUTTON ================= */
.action-btn {
    display: inline-block;
    width: 60%;
    padding: 14px;
    border: none;
    border-radius: 6px;
    background: #ff6a00;
    color: black;
    font-weight: 700;
    font-size: 15px;
    text-decoration: none;
    transition: opacity 0.2s ease;
    cursor: pointer;
}

.action-btn:hover {
    opacity: 0.9;
}

.action-btn.secondary {
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: white;
}

.action-btn.secondary:hover {
    background: rgba(255, 255, 255, 0.05);
}
</style>
</head>

<body class="result-page">

<div class="solar-background-canvas">
    <div class="solar-core-orb"></div>
</div>

<nav class="global-navbar-pod">
    <div class="nav-brand-container">
        <span class="brand-text">MyValue</span>
    </div>
    <div class="nav-links-cluster">
        <a href="/" class="nav-link-item">Home</a>
        <a href="/predict/house" class="nav-link-item">House Prediction</a>
    </div>
    <div class="nav-system-status">
        <span class="status-dot green-pulse"></span>
        <span class="status-label">Calculation Done</span>
    </div>
</nav>

<main class="page-wrapper">

    {% if error %}
    <div class="result-card error-card">
        <h2 class="error-title">Prediction Failed</h2>
        <p class="error-message">{{ error }}</p>
        <a href="/predict/house" class="action-btn secondary">Predict Again ➔</a>
    </div>
    {% else %}
    <div class="result-card">
        <h2>Estimated Valuation</h2>
        <p class="subtitle">Based on your properties calculated features</p>
        
        <div class="price-display" id="animated-price" data-target="{{ prediction }}">
            ₹0.00 Lakhs
        </div>
        
        <a href="/predict/house" class="action-btn">Predict Another ➔</a>
    </div>
    {% endif %}

</main>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const priceDisplay = document.getElementById("animated-price");
    if (!priceDisplay) return;

    // Extract raw float number passed from the Flask backend route
    const targetValue = parseFloat(priceDisplay.getAttribute("data-target"));
    const duration = 1500; // Animation running duration window in milliseconds (1.5 seconds)
    const startTime = performance.now();

    function updateCounter(currentTime) {
        const elapsedTime = currentTime - startTime;
        const progress = Math.min(elapsedTime / duration, 1);

        // Easing function (Ease-Out Quad) to make the speed decelerate smoothly near the end
        const easeProgress = progress * (2 - progress);

        const currentValue = easeProgress * targetValue;

        // Formats the output string to include Rupees symbol and Lakhs suffix text
        priceDisplay.textContent = "₹" + currentValue.toLocaleString(undefined, {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        }) + " Lakhs";

        if (progress < 1) {
            requestAnimationFrame(updateCounter);
        }
    }

    requestAnimationFrame(updateCounter);
});
</script>

</body>
</html>

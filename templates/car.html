<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Prediction | MyValue</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>

/* ================= BASE ================= */
body.car-page {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #030305;
    color: white;
}
html, body {
    margin: 0;
    padding: 0;
    height: auto;
    overflow-x: hidden;
    overflow-y: auto;
}

/* ================= BACKGROUND ================= */
.solar-background-canvas {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: radial-gradient(circle at top,
        rgba(255,106,0,0.15),
        rgba(3,3,5,1) 60%
    );
}

.solar-core-orb {
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: #ff6a00;
    filter: blur(120px);
    opacity: 0.25;
    margin: auto;
}

/* ================= NAVBAR ================= */
.global-navbar-pod {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 40px);
    max-width: 1000px;
    height: 64px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 30px;
    background: rgba(5,5,8,0.75);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 32px;
    backdrop-filter: blur(25px);
    z-index: 1000;
}

.nav-links-cluster a {
    color: #cbd5e1;
    text-decoration: none;
    margin: 0 10px;
    font-weight: 600;
    position: relative;
    display: inline-block;
    padding: 4px 0;
}

.nav-links-cluster a.active {
    color: white;
}

/* ✅ FIXED UNDERLINE (CENTERED TO TEXT) */
.nav-links-cluster a.active::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: -6px;
    transform: translateX(-50%);
    width: 100%;
    height: 2px;
    background: #ff6a00;
    border-radius: 2px;
}

/* ================= PAGE ================= */
.page-wrapper {
    position: relative;
    z-index: 5;
    padding: 120px 40px 60px;
    width: 80%;
    margin: auto;
     min-height: 100vh;
    overflow: visible;
}

/* ================= HEADINGS ================= */
.section-headline-area {
    text-align: center;
    margin-bottom: 25px;
}

h2 {
    margin-bottom: 5px;
}

.section-subtitle {
    color: #94a3b8; /* lighter text (FIXED) */
    margin-top: 6px;
}

/* ================= GRID ================= */
.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
}

.form-box {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 25px;
}

/* ================= INPUT FIX ================= */
.input-field-group {
    margin-bottom: 14px;
}

/* label lighter */
label {
    font-size: 12px;
    color: #94a3b8; /* FIXED lighter */
    display: block;
    margin-bottom: 6px;
}

/* INPUT + SELECT SAME SIZE FIX */
input,
select {
    width: 100%;
    height: 42px;           /* INCREASED HEIGHT */
    padding: 10px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(0,0,0,0.4);
    color: white;
    font-size: 14px;
    box-sizing: border-box;
}

/* ================= DROPDOWN STYLE ================= */
select {
    appearance: none;
    cursor: pointer;

    background-image:
        linear-gradient(45deg, transparent 50%, white 50%),
        linear-gradient(135deg, white 50%, transparent 50%);
    background-position:
        calc(100% - 18px) center,
        calc(100% - 13px) center;
    background-size: 5px 5px;
    background-repeat: no-repeat;
}

/* dropdown options (IMPORTANT FIX) */
select option {
    background: black;
    color: white;
}
/* focus */
input:focus,
select:focus {
    outline: none;
    border-color: #ff6a00;
}

/* ================= BUTTON ================= */
button {
    margin-top: 20px;
    margin-left: auto;
    margin-right: auto;
    display: block;
    width: 50%;
    padding: 14px;
    border: none;
    border-radius: 6px;
    background: #ff6a00;
    color: black;
    font-weight: 700;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
}

input[type="number"] {
    -moz-appearance: textfield; /* Firefox */
}
body.car-page {
    overflow: hidden; /* disables free scroll */
}

.master-scroll-container {
    height: 100vh;
    overflow-y: auto;
    scroll-snap-type: none;
    scroll-behavior: smooth;
}

.snap-section {
    scroll-snap-align: start;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* ================= RESPONSIVE ================= */
@media(max-width: 900px){
    .form-grid{
        grid-template-columns: 1fr;
    }
}

</style>
</head>

<body class="car-page">

<!-- BACKGROUND -->
<div class="solar-background-canvas">
    <div class="solar-core-orb"></div>
</div>

<!-- NAVBAR -->
<nav class="global-navbar-pod">

    <div class="nav-brand-container">
        <div class="brand-geometric-logo"></div>
        <span class="brand-text">MyValue</span>
    </div>

    <div class="nav-links-cluster">
        <a href="/" class="nav-link-item">Home</a>
        <a href="/predict/car" class="nav-link-item active">Car Prediction</a>
    </div>

    <div class="nav-system-status">
        <span class="status-dot green-pulse"></span>
        <span class="status-label">Server Active</span>
        <span class="status-dot orange-pulse"></span>
        <span class="status-label">Model Standby</span>
    </div>

</nav>

<!-- PAGE --><main class="master-scroll-container">

<section class="snap-section">
<div class="page-wrapper">

    <div class="section-headline-area">
        <h2>Car Price Prediction</h2>
        <p class="section-subtitle">
            Enter details to estimate car price using ML model
        </p>
    </div>

    <form action="/predict/car/result" method="POST">

        <div class="form-grid">

            <!-- LEFT -->
            <div class="form-box">

                <div class="input-field-group">
                    <label>Kilometers Driven</label>
                    <input type="number" name="km_driven" required>
                </div>

                <div class="input-field-group">
                    <label>Fuel Type</label>
                    <select name="fuel" required>
                        <option value="" disabled selected>Select Fuel Type</option>
                        <option value="1">Petrol</option>
                        <option value="2">Diesel</option>
                        <option value="3">CNG</option>
                    </select>
                </div>

                <div class="input-field-group">
                    <label>Seller Type</label>
                    <select name="seller_type" required>
                        <option value="" disabled selected>Select Seller Type</option>
                        <option value="0">Dealer</option>
                        <option value="1">Individual</option>
                    </select>
                </div>

                <div class="input-field-group">
                    <label>Transmission</label>
                    <select name="transmission" required>
                        <option value="" disabled selected>Select Transmission</option>
                        <option value="0">Manual</option>
                        <option value="1">Automatic</option>
                    </select>
                </div>

                <div class="input-field-group">
                    <label>Owner Count</label>
                    <input type="number" name="owner">
                </div>

            </div>

            <!-- RIGHT -->
            <div class="form-box">

                <div class="input-field-group">
                    <label>Mileage</label>
                    <input type="number" step="0.01" name="mileage">
                </div>

                <div class="input-field-group">
                    <label>Engine (CC)</label>
                    <input type="number" name="engine">
                </div>

                <div class="input-field-group">
                    <label>Max Power</label>
                    <input type="number" step="0.01" name="max_power">
                </div>

                <div class="input-field-group">
                    <label>Seats</label>
                    <input type="number" name="seats">
                </div>

                <div class="input-field-group">
                    <label>Car Age</label>
                    <input type="number" name="car_age">
                </div>

            </div>

        </div>

        <button type="submit">Predict Price →</button>

    </form>

</div>
</section>

</main>

</body>
</html>
